# ==============================================================================
# FADC500 DAQ 프로그램 (frontend_500_mini) 설정 파일
# ==============================================================================

# [DAQ 기본 파라미터]
RUN_NUMBER     101
BOARD          1         # 장비에 할당된 고유 ID (Serial ID)
SAMPLING_RATE  1         # 1: 500MS/s, 2: 250MS/s, 4: 125MS/s

# [트리거 글로벌 설정]
RECORD_LEN     8         # 트리거 발생 시 저장 길이 (1=128ns, 2=256ns, 4=512ns, 8=1us...)
PRESCALE       1         # 트리거 분주비 (1 ~ 65535)
TRIG_TLT       65534     # Trigger Lookup Table (65534 = 0xFFFE = 4채널 OR 조건)
TRIG_ENABLE    15        # 트리거 소스 활성화 비트마스크 (15 = 0xF = 모든 트리거 허용)
PTRIG_INT      0         # 페데스탈 강제 트리거 간격 (ms). 0이면 비활성화.

# ------------------------------------------------------------------------------
# [채널별 개별 설정] 
# 값을 1개 쓰면 4채널 일괄 적용, 4개 쓰면 (Ch0 Ch1 Ch2 Ch3) 개별 적용
# ------------------------------------------------------------------------------
# 아날로그 / 타이밍
DACOFF    3400           # ADC DC 오프셋 (0 ~ 4095)
DLY       100              # 윈도우 딜레이 (ns)
CW        1000           # Coincidence Width (ns)
AMODE     1              # ADC 아날로그 대역폭 (0: Waveform, 1: Filtered)
POL       0              # 신호 극성 (0: Negative, 1: Positive)

# 트리거 조건
THR       50             # 펄스 높이 문턱값 (1 ~ 4095)
TMODE     1              # 트리거 모드 비트마스크 (1: Pulse Count, 2: Width, 4: Peak Sum)
DT        0              # Trigger Deadtime (ns)
PSW       2              # Peak Sum Width (ns)
PCT       1              # Pulse Count Threshold (개수)
PCI       1000           # Pulse Count Interval (ns)
PWT       100            # Pulse Width Threshold (ns)