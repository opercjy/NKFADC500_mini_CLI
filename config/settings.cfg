# 물리 런(Run) 번호
RUN_NUMBER  101

# ------------------------------------------------------------------------------
# [Board Settings]
# BOARD <Module_ID> 형태로 새로운 보드의 설정을 시작합니다.
# FADC500 Mini (Standalone)의 경우 일반적으로 Module ID는 0 입니다.
# ------------------------------------------------------------------------------
BOARD  0

# [Channel Parameters]
# 순서대로 Ch0, Ch1, Ch2, Ch3 에 적용됩니다. (공백으로 구분)
# 값이 4개가 안 되면 입력된 곳까지만 적용됩니다.

# 1. Threshold (Trigger 임계값) : 0 ~ 4095
THR     50      50      100     100

# 2. DAC Offset (Baseline 위치 조정) : 0 ~ 4095
# 통상적으로 Negative 신호(PMT 등)는 상단(약 3000~3500)에 베이스라인을 맞춥니다.
DACOFF  3400    3400    3400    3400

# 3. Polarity (0: Negative, 1: Positive)
POL     0       0       0       0

# 4. Delay (트리거 시점 대비 파형 지연시간)
DLY     0       0       0       0

